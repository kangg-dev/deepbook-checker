<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepbook Multi-Wallet & Airdrop Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e24;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 950px;
        }
        h2 { margin-top: 0; color: #3bc9db; text-align: center; margin-bottom: 25px; }
        
        .header-meta {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .price-status { font-size: 12px; color: #adb5bd; font-style: italic; }
        
        .input-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; color: #adb5bd; margin-bottom: 8px; font-weight: 500; }
        
        /* Input container để chứa nút refresh đẹp hơn */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, textarea {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #444;
            background-color: #2b2b36; color: #fff; box-sizing: border-box;
            font-family: 'Roboto Mono', monospace; font-size: 15px; outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: #3bc9db; }
        
        /* Nút Refresh kiểu mới: To hơn, rõ hơn, có hiệu ứng hover */
        .refresh-btn-new {
            margin-left: 10px;
            padding: 0 18px;
            height: 47px; /* Khớp với chiều cao input */
            background-color: #343a40;
            color: #3bc9db;
            border: 1px solid #495057;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .refresh-btn-new:hover {
            background-color: #3bc9db;
            color: #121212;
            border-color: #3bc9db;
        }
        .refresh-btn-new:active { transform: scale(0.95); }
        .refresh-btn-new:disabled { opacity: 0.5; cursor: not-allowed; }

        .spin { animation: rotate 0.8s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        textarea { resize: vertical; margin-bottom: 15px; }
        
        .btn-main {
            width: 100%; padding: 16px; background-color: #3bc9db; color: #121212;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: all 0.2s; margin-bottom: 25px;
        }
        .btn-main:hover { background-color: #22b8cf; box-shadow: 0 0 15px rgba(59, 201, 219, 0.3); }
        
        table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
            background-color: #2b2b36; border-radius: 10px; overflow: hidden; font-size: 14px;
        }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #3a3a45; }
        th { background-color: #3bc9db; color: #121212; font-weight: bold; }
        .loading { color: #fcc419; }
        .success { color: #51cf66; font-weight: bold; }
        .token-col { color: #fcc419; font-weight: bold; }
        .usd-col { color: #ff922b; font-weight: bold; }
        
        .summary-box {
            margin-top: 25px; padding: 25px; background-color: rgba(59, 201, 219, 0.05);
            border: 1px dashed #3bc9db; border-radius: 12px; display: flex;
            justify-content: space-around; text-align: center;
        }
        .sum-item p { margin: 0 0 8px 0; color: #adb5bd; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sum-item h3 { margin: 0; font-size: 24px; color: #fff; }
        .sum-points { color: #51cf66 !important; }
        .sum-tokens { color: #fcc419 !important; }
        .sum-usd { color: #ff922b !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deepbook Airdrop Calculator</h2>
    
    <div class="header-meta">
        <div class="price-status" id="priceTimer">Đang lấy giá...</div>
    </div>

    <div class="input-row">
        <div class="input-group" style="flex: 0.8;">
            <label>Tỷ lệ (1 Point = x Token)</label>
            <input type="number" id="rateInput" step="any" value="1" oninput="refreshCalculations()">
        </div>
        <div class="input-group">
            <label>Giá $DEEP (DexScreener)</label>
            <div class="input-wrapper">
                <input type="number" id="priceInput" step="any" placeholder="0.000000" oninput="refreshCalculations()">
                <button class="refresh-btn-new" id="manualRefreshBtn" onclick="updateTokenPrice(true)">
                    <span id="refreshIcon">🔄</span> Làm mới
                </button>
            </div>
        </div>
    </div>

    <textarea id="walletInput" rows="5" placeholder="Dán danh sách ví (xuống dòng hoặc dấu phẩy)..."></textarea>
    <button class="btn-main" onclick="processWallets()">🚀 Kiểm tra & Tính toán</button>
    
    <div id="resultArea" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th width="5%">#</th>
                    <th width="35%">Địa chỉ Ví</th>
                    <th width="20%">Điểm (Points)</th>
                    <th width="20%">Số Token</th>
                    <th width="20%">Giá trị ($)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="summary-box">
            <div class="sum-item">
                <p>Tổng Ví</p>
                <h3 id="validCount">0</h3>
            </div>
            <div class="sum-item">
                <p>Tổng Points</p>
                <h3 id="totalPoints" class="sum-points">0</h3>
            </div>
            <div class="sum-item">
                <p>Tổng Token</p>
                <h3 id="totalTokens" class="sum-tokens">0</h3>
            </div>
            <div class="sum-item">
                <p>Tổng USD</p>
                <h3 id="totalUsd" class="sum-usd">$0.00</h3>
            </div>
        </div>
    </div>
</div>

<script>
    const DEEP_TOKEN_ADDR = '0xdeeb7a4662eec9f2f3def03fb937a663dddaa2e215b8078a284d026b7946c270::deep::DEEP';
    let walletPointsData = []; 

    function shortenAddress(addr) {
        return addr.length > 15 ? addr.slice(0, 6) + '...' + addr.slice(-4) : addr;
    }

    async function updateTokenPrice(isManual = false) {
        const priceInput = document.getElementById('priceInput');
        const priceTimer = document.getElementById('priceTimer');
        const refreshBtn = document.getElementById('manualRefreshBtn');
        const refreshIcon = document.getElementById('refreshIcon');
        
        if (isManual) {
            refreshBtn.disabled = true;
            refreshIcon.classList.add('spin');
        }

        try {
            const encodedAddr = encodeURIComponent(DEEP_TOKEN_ADDR);
            const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${encodedAddr}`);
            const data = await res.json();
            
            if (data.pairs && data.pairs.length > 0) {
                const bestPair = data.pairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0))[0];
                
                // Lấy giá thô (raw price) để đảm bảo tính nhất quán
                const rawPrice = bestPair.priceUsd;
                const formattedPrice = parseFloat(rawPrice).toFixed(6);
                
                // FIX LỖI: Cả 2 nơi cùng dùng chung một biến formattedPrice
                priceInput.value = formattedPrice; 
                priceTimer.innerText = `Giá $DEEP: $${formattedPrice} (${isManual ? 'Vừa cập nhật' : 'Tự động lúc ' + new Date().toLocaleTimeString()})`;
                
                if (walletPointsData.length > 0) refreshCalculations();
            }
        } catch (err) {
            console.error("DexScreener Error:", err);
            priceTimer.innerText = "Lỗi cập nhật giá!";
        } finally {
            if (isManual) {
                setTimeout(() => {
                    refreshBtn.disabled = false;
                    refreshIcon.classList.remove('spin');
                }, 600);
            }
        }
    }

    function refreshCalculations() {
        const rate = parseFloat(document.getElementById('rateInput').value) || 0;
        const price = parseFloat(document.getElementById('priceInput').value) || 0;
        
        let totalSumPoints = 0, totalSumTokens = 0, totalSumUsd = 0;

        walletPointsData.forEach((item, index) => {
            const tokens = item.points * rate;
            const usdValue = tokens * price;

            totalSumPoints += item.points;
            totalSumTokens += tokens;
            totalSumUsd += usdValue;

            const ptsTd = document.getElementById(`pts-${index}`);
            const tokTd = document.getElementById(`tok-${index}`);
            const usdTd = document.getElementById(`usd-${index}`);

            if (ptsTd && !ptsTd.classList.contains('loading')) {
                ptsTd.innerText = item.points.toLocaleString();
                tokTd.innerText = tokens.toLocaleString(undefined, {maximumFractionDigits: 2});
                usdTd.innerText = usdValue.toLocaleString('en-US', {style: 'currency', currency: 'USD'});
            }
        });

        document.getElementById('totalPoints').innerText = totalSumPoints.toLocaleString();
        document.getElementById('totalTokens').innerText = totalSumTokens.toLocaleString(undefined, {maximumFractionDigits: 2});
        document.getElementById('totalUsd').innerText = totalSumUsd.toLocaleString('en-US', {style: 'currency', currency: 'USD'});
    }

    async function processWallets() {
        const inputStr = document.getElementById('walletInput').value;
        const tableBody = document.getElementById('tableBody');
        const resultArea = document.getElementById('resultArea');

        let addresses = inputStr.split(/[\s,]+/).map(a => a.trim()).filter(a => a !== '');
        addresses = [...new Set(addresses)];

        if (addresses.length === 0) return alert('Vui lòng nhập địa chỉ ví!');

        tableBody.innerHTML = '';
        resultArea.style.display = 'block';
        walletPointsData = addresses.map(addr => ({ address: addr, points: 0 }));

        addresses.forEach((addr, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="short-addr" title="${addr}">${shortenAddress(addr)}</td>
                <td id="pts-${index}" class="loading">⏳ Loading...</td>
                <td id="tok-${index}" class="token-col">-</td>
                <td id="usd-${index}" class="usd-col">-</td>
            `;
            tableBody.appendChild(tr);
        });

        const chunkSize = 20;
        for (let i = 0; i < addresses.length; i += chunkSize) {
            const chunk = addresses.slice(i, i + chunkSize);
            try {
                const res = await fetch(`https://deepbook-indexer.mainnet.mystenlabs.com/get_points?addresses=${chunk.join(',')}`);
                const data = await res.json();

                data.forEach(item => {
                    const idx = addresses.findIndex(a => a.toLowerCase() === item.address.toLowerCase());
                    if (idx !== -1) {
                        walletPointsData[idx].points = item.total_points || 0;
                        document.getElementById(`pts-${idx}`).className = 'success';
                    }
                });
                document.getElementById('validCount').innerText = addresses.length;
                refreshCalculations();
            } catch (err) { console.error(err); }
        }
    }

    window.onload = () => {
        updateTokenPrice();
        setInterval(updateTokenPrice, 60000);
    };
</script>

</body>
</html>
