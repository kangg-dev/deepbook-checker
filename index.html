<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepbook Airdrop Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3bc9db;
            --bg: #0b0e11;
            --card-bg: #161a1e;
            --input-bg: #1e2329;
            --border: #2b3139;
            --text-main: #eaecef;
            --text-dim: #929aa5;
            --success: #02c076;
            --warning: #f0b90b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Input Styles --- */
        .field-group { margin-bottom: 18px; }
        .field-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .input-control {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .input-control:focus-within { border-color: var(--primary); background: #222930; }

        input, select, textarea {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            outline: none;
        }

        input::placeholder { color: #474d57; }

        /* --- Stats Badge --- */
        .highlight-box {
            background: rgba(59, 201, 219, 0.05);
            border: 1px solid rgba(59, 201, 219, 0.15);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .highlight-val { font-size: 20px; font-weight: 700; color: var(--primary); }

        /* --- Buttons --- */
        .btn-icon {
            background: #2b3139;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            transition: 0.2s;
        }
        .btn-icon:hover { color: var(--primary); background: #363c45; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- Result Area --- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .stat-card {
            background: var(--input-bg);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono'; }

        .spin { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-content">
        <div class="card" style="margin-bottom: 24px;">
            <div class="section-title">✨ Airdrop Simulator</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="field-group">
                    <label class="field-label">Dán danh sách ví</label>
                    <div class="input-control">
                        <textarea id="walletInput" rows="5" placeholder="0x...&#10;0x..."></textarea>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Hoặc nhập số Point cá nhân</label>
                    <div class="input-control" style="height: 115px;">
                        <input type="number" id="manualSinglePoints" placeholder="Ví dụ: 10,000" oninput="handleManualInput()">
                    </div>
                </div>
            </div>

            <button class="btn-primary" onclick="processWallets()">🚀 CHẠY TÍNH TOÁN</button>

            <div id="resultArea" style="display:none;">
                <div class="summary-grid">
                    <div class="stat-card">
                        <div class="stat-label">Tổng Points</div>
                        <div class="stat-value" id="totalPoints">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Tổng $DEEP</div>
                        <div class="stat-value" id="totalTokens" style="color: var(--warning);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card">
                        <div class="stat-label">Giá trị (USD)</div>
                        <div class="stat-value" id="totalUsd" style="color: var(--success);">$0.00</div>
                    </div>
                </div>
                <table id="walletTable">
                    <thead><tr><th>Ví</th><th>Points</th><th>$DEEP</th><th>USD</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div class="section-title">⚙️ Project Params</div>
            
            <div class="highlight-box">
                <div class="stat-label">Tỷ lệ quy đổi hiện tại</div>
                <div class="highlight-val" id="rateDisplay">1 Pt = 0.00 DEEP</div>
            </div>

            <div class="field-group">
                <label class="field-label">Gợi ý % Supply</label>
                <div class="input-control">
                    <select id="percentSelect" onchange="applyQuickPercent()">
                        <option value="0.1">0.1% Supply</option>
                        <option value="0.5">0.5% Supply</option>
                        <option value="1.0">1.0% Supply</option>
                        <option value="2.0" selected>2.0% Supply</option>
                        <option value="3.0">3.0% Supply</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">% Supply Airdrop</label>
                <div class="input-control">
                    <input type="number" id="supplyPercent" value="2.0" step="0.1" oninput="calculateFromSupply()">
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Tổng Point Hệ thống</label>
                <div class="input-control">
                    <input type="number" id="systemTotalPoints" value="12000000" readonly oninput="calculateFromSupply()">
                    <button class="btn-icon" onclick="toggleUnlock()" id="unlockBtn">🔓</button>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Deep Per Point</label>
                <div class="input-control">
                    <input type="number" id="deepPerPoint" step="any" oninput="calculateFromRate()">
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Giá $DEEP (Market)</label>
                <div class="input-control">
                    <input type="number" id="priceInput" step="any" oninput="refreshCalculations()">
                    <button class="btn-icon" onclick="updateTokenPrice(true)"><span id="refIcon">🔄</span></button>
                </div>
                <div id="priceTimer" style="font-size: 10px; color: var(--text-dim); margin-top: 5px; text-align: right;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const DEEP_TOKEN_ADDR = '0xdeeb7a4662eec9f2f3def03fb937a663dddaa2e215b8078a284d026b7946c270::deep::DEEP';
    const TOTAL_SUPPLY = 10000000000;
    let walletPointsData = [];

    function applyQuickPercent() {
        const val = document.getElementById('percentSelect').value;
        if(val) { document.getElementById('supplyPercent').value = val; calculateFromSupply(); }
    }

    function calculateFromSupply() {
        const percent = parseFloat(document.getElementById('supplyPercent').value) || 0;
        const sysPoints = parseFloat(document.getElementById('systemTotalPoints').value) || 1;
        const rate = (percent / 100 * TOTAL_SUPPLY) / sysPoints;
        document.getElementById('deepPerPoint').value = rate.toFixed(8);
        updateRateDisplay(rate);
        refreshCalculations();
    }

    function calculateFromRate() {
        const rate = parseFloat(document.getElementById('deepPerPoint').value) || 0;
        const sysPoints = parseFloat(document.getElementById('systemTotalPoints').value) || 1;
        const percent = ((rate * sysPoints) / TOTAL_SUPPLY) * 100;
        document.getElementById('supplyPercent').value = percent.toFixed(2);
        updateRateDisplay(rate);
        refreshCalculations();
    }

    function updateRateDisplay(rate) {
        document.getElementById('rateDisplay').innerText = `1 Pt = ${rate.toLocaleString(undefined, {maximumFractionDigits: 4})} DEEP`;
    }

    function toggleUnlock() {
        const input = document.getElementById('systemTotalPoints');
        input.readOnly = !input.readOnly;
        document.getElementById('unlockBtn').innerText = input.readOnly ? "🔓" : "🔒";
    }

    async function updateTokenPrice(isManual = false) {
        const icon = document.getElementById('refIcon');
        if (isManual) icon.classList.add('spin');
        try {
            const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${encodeURIComponent(DEEP_TOKEN_ADDR)}`);
            const data = await res.json();
            if (data.pairs?.[0]) {
                const price = parseFloat(data.pairs[0].priceUsd);
                document.getElementById('priceInput').value = price.toFixed(6);
                document.getElementById('priceTimer').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
                refreshCalculations();
            }
        } catch (e) { console.error(e); }
        finally { if (isManual) setTimeout(() => icon.classList.remove('spin'), 600); }
    }

    function refreshCalculations() {
        const price = parseFloat(document.getElementById('priceInput').value) || 0;
        const rate = parseFloat(document.getElementById('deepPerPoint').value) || 0;
        let sPts = 0, sTok = 0, sUsd = 0;
        const tableBody = document.getElementById('tableBody');
        const isTable = document.getElementById('walletTable').style.display !== 'none';
        if (isTable) tableBody.innerHTML = '';

        walletPointsData.forEach((item, idx) => {
            const tok = item.points * rate;
            const usd = tok * price;
            sPts += item.points; sTok += tok; sUsd += usd;
            if (isTable) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.address.slice(0,6)}...</td><td>${item.points.toLocaleString()}</td><td style="color:var(--warning)">${tok.toLocaleString(undefined,{maximumFractionDigits:1})}</td><td style="color:var(--success)">$${usd.toLocaleString(undefined,{minimumFractionDigits:2})}</td>`;
                tableBody.appendChild(tr);
            }
        });
        document.getElementById('totalPoints').innerText = sPts.toLocaleString();
        document.getElementById('totalTokens').innerText = sTok.toLocaleString(undefined,{maximumFractionDigits:0});
        document.getElementById('totalUsd').innerText = '$' + sUsd.toLocaleString(undefined,{minimumFractionDigits:2});
    }

    function handleManualInput() {
        const val = document.getElementById('manualSinglePoints').value;
        if (val > 0) {
            document.getElementById('walletInput').value = '';
            walletPointsData = [{ address: "Cá nhân", points: parseFloat(val) }];
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('walletTable').style.display = 'none';
            refreshCalculations();
        }
    }

    async function processWallets() {
        const input = document.getElementById('walletInput').value;
        if (!input && !document.getElementById('manualSinglePoints').value) return;
        if (document.getElementById('manualSinglePoints').value) { handleManualInput(); return; }

        let addrs = [...new Set(input.split(/[\s,]+/).filter(a => a))];
        document.getElementById('walletTable').style.display = 'table';
        document.getElementById('resultArea').style.display = 'block';
        walletPointsData = addrs.map(a => ({ address: a, points: 0 }));

        for (let i = 0; i < addrs.length; i += 20) {
            const chunk = addrs.slice(i, i + 20);
            try {
                const res = await fetch(`https://deepbook-indexer.mainnet.mystenlabs.com/get_points?addresses=${chunk.join(',')}`);
                const data = await res.json();
                data.forEach(d => {
                    const found = walletPointsData.find(w => w.address.toLowerCase() === d.address.toLowerCase());
                    if (found) found.points = d.total_points || 0;
                });
                refreshCalculations();
            } catch (e) { console.error(e); }
        }
    }

    window.onload = () => { updateTokenPrice(); calculateFromSupply(); setInterval(updateTokenPrice, 60000); };
</script>
</body>
</html>
