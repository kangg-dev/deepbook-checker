<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepbook Airdrop Simulator</title>
    <style>
        :root { --primary: #3bc9db; --bg: #121212; --card: #1e1e24; --input: #2b2b36; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: #fff; display: flex; justify-content: center; padding: 40px 20px; margin: 0; min-height: 100vh; box-sizing: border-box; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 950px; }
        h2 { margin-top: 0; color: var(--primary); text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .price-status { font-size: 12px; color: #adb5bd; text-align: right; margin-bottom: 10px; font-style: italic; }
        
        .input-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; color: #adb5bd; margin-bottom: 8px; font-weight: 500; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #444; background-color: var(--input); color: #fff; box-sizing: border-box; font-family: 'Roboto Mono', monospace; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(59, 201, 219, 0.2); }

        .refresh-btn { margin-left: 10px; padding: 0 15px; height: 47px; background: #343a40; color: var(--primary); border: 1px solid #495057; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .refresh-btn:hover { background: var(--primary); color: #121212; }
        .spin { animation: rotate 0.8s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .calc-info { margin-bottom: 20px; padding: 12px; background: rgba(59, 201, 219, 0.1); border-radius: 8px; color: var(--primary); font-size: 14px; text-align: center; font-weight: bold; }

        .btn-main { width: 100%; padding: 16px; background-color: var(--primary); color: #121212; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 201, 219, 0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: var(--input); border-radius: 10px; overflow: hidden; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #3a3a45; }
        th { background-color: var(--primary); color: #121212; }
        
        .summary-box { margin-top: 25px; padding: 25px; background: linear-gradient(145deg, #23232c, #1e1e24); border: 1px solid #3bc9db; border-radius: 16px; display: flex; justify-content: space-around; text-align: center; flex-wrap: wrap; gap: 20px; }
        .sum-item p { margin: 0 0 8px 0; color: #adb5bd; font-size: 12px; text-transform: uppercase; }
        .sum-item h3 { margin: 0; font-size: 26px; }
        .color-pts { color: #51cf66; } .color-tok { color: #fcc419; } .color-usd { color: #ff922b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deepbook Airdrop Simulator</h2>
    
    <div class="price-status" id="priceTimer">Đang lấy giá từ DexScreener...</div>

    <div class="input-row">
        <div class="input-group">
            <label>% Supply Airdrop (Tổng 10B)</label>
            <input type="number" id="supplyPercent" value="5" step="0.1" oninput="calculateRate()">
        </div>
        <div class="input-group">
            <label>Tổng Point hệ thống (Để tính tỷ lệ)</label>
            <input type="number" id="systemTotalPoints" value="100000000" oninput="calculateRate()">
        </div>
        <div class="input-group">
            <label>Giá $DEEP (USD)</label>
            <div class="input-wrapper">
                <input type="number" id="priceInput" step="any" oninput="refreshCalculations()">
                <button class="refresh-btn" onclick="updateTokenPrice(true)"><span id="refIcon">🔄</span></button>
            </div>
        </div>
    </div>

    <div id="rateDisplay" class="calc-info">Tỷ lệ quy đổi: 1 Point = 0.00 DEEP</div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

    <div class="input-row">
        <div class="input-group">
            <label>Dán danh sách ví (Nếu muốn check nhiều ví)</label>
            <textarea id="walletInput" rows="4" placeholder="Ví 1, Ví 2..."></textarea>
        </div>
        <div class="input-group" style="flex: 0.5;">
            <label>Hoặc: Nhập số Point riêng</label>
            <input type="number" id="manualSinglePoints" placeholder="Ví dụ: 5000" oninput="handleManualInput()">
        </div>
    </div>

    <button class="btn-main" onclick="processWallets()">🚀 Chạy tính toán</button>
    
    <div id="resultArea" style="display: none; margin-top: 20px;">
        <table id="walletTable">
            <thead>
                <tr><th>#</th><th>Địa chỉ Ví</th><th>Points</th><th>Token</th><th>Giá trị ($)</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="summary-box">
            <div class="sum-item"><p>Tổng Points</p><h3 id="totalPoints" class="color-pts">0</h3></div>
            <div class="sum-item"><p>Tổng $DEEP</p><h3 id="totalTokens" class="color-tok">0</h3></div>
            <div class="sum-item"><p>Tổng USD</p><h3 id="totalUsd" class="color-usd">$0.00</h3></div>
        </div>
    </div>
</div>

<script>
    const DEEP_TOKEN_ADDR = '0xdeeb7a4662eec9f2f3def03fb937a663dddaa2e215b8078a284d026b7946c270::deep::DEEP';
    const TOTAL_SUPPLY = 10000000000;
    let walletPointsData = [];
    let currentRate = 0;

    // 1. Tính toán tỷ lệ quy đổi dựa trên % Supply
    function calculateRate() {
        const percent = parseFloat(document.getElementById('supplyPercent').value) || 0;
        const sysPoints = parseFloat(document.getElementById('systemTotalPoints').value) || 1;
        
        const totalAirdropTokens = (percent / 100) * TOTAL_SUPPLY;
        currentRate = totalAirdropTokens / sysPoints;
        
        document.getElementById('rateDisplay').innerText = 
            `Phân bổ: ${totalAirdropTokens.toLocaleString()} DEEP | Tỷ lệ: 1 Point = ${currentRate.toFixed(4)} DEEP`;
        
        refreshCalculations();
    }

    // 2. Xử lý khi người dùng nhập point trực tiếp (không dùng ví)
    function handleManualInput() {
        const val = document.getElementById('manualSinglePoints').value;
        if (val > 0) {
            document.getElementById('walletInput').value = ''; // Xóa textarea nếu nhập số
            walletPointsData = [{ address: "Ví của bạn (Nhập tay)", points: parseFloat(val) }];
            showSummaryOnly();
        }
    }

    function showSummaryOnly() {
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('walletTable').style.display = 'none';
        refreshCalculations();
    }

    // 3. Lấy giá từ DexScreener
    async function updateTokenPrice(isManual = false) {
        const icon = document.getElementById('refIcon');
        if (isManual) icon.classList.add('spin');

        try {
            const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${encodeURIComponent(DEEP_TOKEN_ADDR)}`);
            const data = await res.json();
            if (data.pairs?.[0]) {
                const price = parseFloat(data.pairs[0].priceUsd);
                document.getElementById('priceInput').value = price.toFixed(6);
                document.getElementById('priceTimer').innerText = `Giá $DEEP: $${price.toFixed(6)} (Cập nhật: ${new Date().toLocaleTimeString()})`;
                refreshCalculations();
            }
        } catch (e) { console.error(e); }
        finally { if (isManual) setTimeout(() => icon.classList.remove('spin'), 600); }
    }

    // 4. Tính toán toàn bộ con số
    function refreshCalculations() {
        const price = parseFloat(document.getElementById('priceInput').value) || 0;
        let sumPts = 0, sumTok = 0, sumUsd = 0;

        const tableBody = document.getElementById('tableBody');
        const isTableVisible = document.getElementById('walletTable').style.display !== 'none';

        if (isTableVisible) tableBody.innerHTML = '';

        walletPointsData.forEach((item, index) => {
            const tokens = item.points * currentRate;
            const usd = tokens * price;
            sumPts += item.points; sumTok += tokens; sumUsd += usd;

            if (isTableVisible) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index+1}</td>
                    <td>${item.address.length > 20 ? item.address.slice(0,6)+'...'+item.address.slice(-4) : item.address}</td>
                    <td>${item.points.toLocaleString()}</td>
                    <td class="color-tok">${tokens.toLocaleString(undefined, {maximumFractionDigits: 1})}</td>
                    <td class="color-usd">$${usd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                `;
                tableBody.appendChild(tr);
            }
        });

        document.getElementById('totalPoints').innerText = sumPts.toLocaleString();
        document.getElementById('totalTokens').innerText = sumTok.toLocaleString(undefined, {maximumFractionDigits: 0});
        document.getElementById('totalUsd').innerText = '$' + sumUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // 5. Xử lý danh sách ví (Fetch Deepbook API)
    async function processWallets() {
        const input = document.getElementById('walletInput').value;
        const manualVal = document.getElementById('manualSinglePoints').value;

        if (!input && !manualVal) return alert("Vui lòng nhập ví hoặc số point!");

        if (manualVal) {
            handleManualInput();
            return;
        }

        let addrs = [...new Set(input.split(/[\s,]+/).filter(a => a))];
        document.getElementById('walletTable').style.display = 'table';
        document.getElementById('resultArea').style.display = 'block';
        
        walletPointsData = addrs.map(a => ({ address: a, points: 0 }));
        refreshCalculations();

        for (let i = 0; i < addrs.length; i += 20) {
            const chunk = addrs.slice(i, i + 20);
            try {
                const res = await fetch(`https://deepbook-indexer.mainnet.mystenlabs.com/get_points?addresses=${chunk.join(',')}`);
                const data = await res.json();
                data.forEach(d => {
                    const found = walletPointsData.find(w => w.address.toLowerCase() === d.address.toLowerCase());
                    if (found) found.points = d.total_points || 0;
                });
                refreshCalculations();
            } catch (e) { console.error(e); }
        }
    }

    window.onload = () => { calculateRate(); updateTokenPrice(); setInterval(updateTokenPrice, 60000); };
</script>
</body>
</html>
